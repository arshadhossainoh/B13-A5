<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main Page</title>
    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- tailwind + daisyui  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <!-- <header class="h-10 flex justify-between items-center bg-white shadow-sm">
      <div class="flex items-center px-10 py-5">
        <img class="w-[15%]" src="./assets/github-logo.png" alt="" />
        <p>GitHub Issues Tracker</p>
      </div>
      <div class="px-10 py-5">
        <input type="text" placeholder="Search issues" />
        <button>+New Issues</button>
      </div> -->
    <!-- </header> -->
    <header class="container mx-auto mt-5">
      <nav class="flex justify-between">
        <div class="">
          <h2 class="font-bold">All Issues</h2>
          <br />
          <div>
            <button
              onclick="toggleBtns('all-btn')"
              id="all-btn"
              class="btn btn-primary"
            >
              All
            </button>
            <button onclick="toggleBtns('open-btn')" id="open-btn" class="btn">
              Open
            </button>
            <button
              onclick="toggleBtns('closed-btn')"
              id="closed-btn"
              class="btn"
            >
              Closed
            </button>
          </div>
        </div>
        <div class="flex gap-5 items-center">
          <input
            id="search-input"
            class="w-[50%%] h-[40%]"
            type="text"
            placeholder="Search issues"
          />
          <button
            onclick="searchInfo()"
            id="search-btn"
            class="btn btn-primary"
          >
            Search
          </button>
        </div>
      </nav>
    </header>

    <section
      class="container mx-auto mt-5 flex justify-between p-2 border border-gray-100 mb-5"
    >
      <div class="left-side flex justify-between items-center gap-2">
        <div>
          <img src="./assets/Aperture.png" alt="" />
        </div>
        <div>
          <h2 class="font-bold"><span id="count-issue">0</span> Issues</h2>
          <p>Track and manage your project issues</p>
        </div>
      </div>
      <div class="right-side flex justify-between gap-2">
        <p>&#128994; Open</p>
        <p>&#128995; Closed</p>
      </div>
    </section>

    <section class="container mx-auto p-5 bg-white shadow-md">
      <!-- card section  -->
      <div
        id="cardContainer"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5"
      ></div>

      <!-- open card section  -->
      <div id="openContainer"></div>

      <!-- closed card section  -->
      <div></div>
    </section>

    <!-- loading spinner  -->
    <div
      id="loadingSpinner"
      class="h-[60vh] hidden flex justify-center items-center"
    >
      <span class="loading loading-spinner loading-xl"></span>
    </div>

    <!-- product deatails modal -->

    <!-- Open the modal using ID.showModal() method -->

    <dialog id="issue_details_modal" class="modal">
      <div class="modal-box">
        <!-- Modal Header with Close Button -->
        <div class="flex justify-between items-start mb-4">
          <h3 class="font-bold text-2xl text-green-700" id="modalTitle">
            Issue Details
          </h3>
          <button
            class="btn btn-sm btn-circle btn-ghost"
            onclick="document.getElementById('issue_details_modal').close()"
          >
            ✕
          </button>
        </div>

        <!-- Modal Content -->

        <!-- Plant Details -->
        <div class="space-y-3">
          <!-- <p class="text-sm text-gray-500 mb-2">
              <span class="font-bold">Category:</span>
              <span id="modalCategory" class="badge badge-primary"></span>
            </p>
            <p class="text-sm text-gray-600 mb-4">
              <span id="modalDescription"></span>
            </p>
            <div class="flex items-baseline gap-2 mb-6">
              <span class="text-3xl font-bold text-green-600"
                >$<span id="modalPrice">0</span></span
              >
            </div> -->

          <p>
            <span id="modal-status">status</span> &nbsp; Opened by:
            <span id="modal-author">author</span> .
            <span id="modal-date">date</span> &nbsp;
          </p>
          <p>
            <span id="modal-bug" class="bg-yellow-400">bug</span> &nbsp;
            <span id="modal-help-wanted" class="bg-yellow-400"
              >help wanted</span
            >
          </p>
          <p id="modal-des">description</p>
          <p><span class="mr-70">Assignee</span> <span>Priority</span></p>
          <p>
            <span id="assignee" class="mr-70"></span>
            <span id="priority" class="bg-violet-200"></span>
          </p>
        </div>

        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="./script/mainpage.js"></script>
  </body>
</html>
